name: publish

on:
  push:
    tags:
      - 'v*'

# Tag-triggered RubyGems release. Pushing a git tag like `v0.1.0` runs specs,
# builds the gem, and publishes to RubyGems.org when credentials are wired.
#
# AUTH — two supported paths (pick one):
#
# 1. Trusted Publishing / OIDC (recommended):
#    - Create a *pending* trusted publisher on RubyGems.org for gem name `authio`
#      (Profile → Pending trusted publishers) pointing at repo `Authio-com/authio_ruby`
#      and workflow `publish.yml`. Optional GitHub Environment: `release`.
#    - Set repo/org variable `RUBYGEMS_TRUSTED_PUBLISHING=true` (Settings →
#      Secrets and variables → Actions → Variables). No long-lived API key needed.
#    - Requires `id-token: write` (below) and a public repo (or GitHub Enterprise
#      OIDC support).
#
# 2. Legacy API key (bootstrap fallback):
#    - RubyGems.org → Profile → API keys → Create with scope `authio` (gem push).
#      Account MFA is required because `authio.gemspec` sets
#      `rubygems_mfa_required`.
#    - Store as org/repo secret `RUBYGEMS_API_KEY` (maps to `GEM_HOST_API_KEY`).
#
# GitHub Actions cannot reference `secrets.*` inside an `if:`, so credentials are
# hoisted to job-level `env`. At least one publishing path is mandatory.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Uncomment when the RubyGems trusted publisher specifies environment "release".
    # environment: release
    env:
      RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      RUBYGEMS_TRUSTED_PUBLISHING: ${{ vars.RUBYGEMS_TRUSTED_PUBLISHING }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.9.0
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rspec
      - name: Require RubyGems publishing configuration
        run: |
          if [ "${RUBYGEMS_TRUSTED_PUBLISHING:-}" != "true" ] && [ -z "${RUBYGEMS_API_KEY:-}" ]; then
            echo "::error::Configure trusted publishing or RUBYGEMS_API_KEY for a release tag"
            exit 1
          fi
      - name: Publish to RubyGems (trusted publishing / OIDC)
        if: env.RUBYGEMS_TRUSTED_PUBLISHING == 'true'
        uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1.4.0
      - name: Publish to RubyGems (legacy API key)
        if: env.RUBYGEMS_TRUSTED_PUBLISHING != 'true' && env.RUBYGEMS_API_KEY != ''
        run: |
          gem build authio.gemspec
          gem push authio-*.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
